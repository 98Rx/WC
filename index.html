<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup 26</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cairo:wght@400;900&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Cairo', sans-serif;
  background: #000;
}

#bgvid {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  opacity: .25;
}

.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(to bottom, rgba(0,0,0,.4) 0%, rgba(0,0,0,.6) 100%);
}

/* LIGHT */
body.light { background: #f2f0ec; }
body.light #bgvid { opacity: .08; }
body.light .overlay { background: linear-gradient(to bottom, rgba(242,240,236,.6), rgba(242,240,236,.85)); }
body.light .wc-text { color: #111; }
body.light .btn { background: #111; color: #fff; }
body.light .btn:hover { background: #E63329; }
body.light .foot { color: rgba(0,0,0,.25); }
body.light .tog { border-color: rgba(0,0,0,.15); color: #333; background: rgba(0,0,0,.05); }

/* STAGE */
.stage {
  position: fixed; inset: 0; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
  padding: 24px;
  text-align: center;
}

/* LOGO */
.logo-wrap {
  margin-bottom: 20px;
  animation: up .9s cubic-bezier(.16,1,.3,1) both;
}
.logo-wrap img {
  width: clamp(100px, 28vw, 170px);
  height: auto;
}

/* 26 */
.num {
  font-family: 'Anton', sans-serif;
  font-size: clamp(9rem, 34vw, 20rem);
  line-height: .82;
  letter-spacing: -6px;
  color: #fff;
  animation: up .9s .08s cubic-bezier(.16,1,.3,1) both;
}

/* WORLD CUP */
.wc-text {
  font-family: 'Anton', sans-serif;
  font-size: clamp(1rem, 4vw, 2rem);
  letter-spacing: clamp(8px, 2.5vw, 18px);
  color: rgba(255,255,255,.45);
  text-transform: uppercase;
  margin-top: -2px;
  animation: up .9s .15s cubic-bezier(.16,1,.3,1) both;
}

/* BTN */
.btn-wrap {
  margin-top: 38px;
  animation: up .9s .28s cubic-bezier(.16,1,.3,1) both;
}
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  text-decoration: none;
  background: #E63329;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: clamp(.9rem, 2.5vw, 1rem);
  padding: 14px 38px;
  border-radius: 3px;
  transition: background .2s, transform .2s;
}
.btn:hover {
  background: #c0241a;
  transform: translateY(-2px);
}

/* TOGGLE */
.tog {
  position: fixed; bottom: 26px; left: 26px; z-index: 10;
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.2);
  color: rgba(255,255,255,.7);
  font-size: .85rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.tog:hover { background: rgba(255,255,255,.16); }

/* FOOTER */
.foot {
  position: fixed; bottom: 18px; right: 0; left: 0;
  text-align: center; z-index: 10;
  font-size: .58rem; letter-spacing: 3px;
  color: rgba(255,255,255,.18);
  text-transform: uppercase;
}

@keyframes up {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}
</style>
</head>
<body>

<video id="bgvid" autoplay muted loop playsinline>
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4"/>
</video>
<div class="overlay"></div>

<button class="tog" id="tog" onclick="toggleTheme()">☀️</button>

<div class="stage">

  <div class="logo-wrap">
    <img
      src="https://upload.wikimedia.org/wikipedia/en/thumb/7/7c/2026_FIFA_World_Cup_logo.svg/800px-2026_FIFA_World_Cup_logo.svg.png"
      alt="FIFA World Cup 2026"
      onerror="this.style.display='none'"
    />
  </div>

  <div class="num">26</div>
  <div class="wc-text">World Cup</div>

  <div class="btn-wrap">
    <a class="btn"
       href="https://filebin.net/4uh1g14vese6stj6/World%20Cup%202026%20_%20Saqer%20.ics"
       target="_blank" rel="noopener">
      📅 &nbsp;حمّل كالندر المباريات
    </a>
  </div>

</div>

<div class="foot">Proudly made by Saqer</div>

<script>
function toggleTheme(){
  document.body.classList.toggle('light');
  document.getElementById('tog').textContent =
    document.body.classList.contains('light') ? '🌙' : '☀️';
}
</script>
</body>
</html>
